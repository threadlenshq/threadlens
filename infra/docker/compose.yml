# Open-core Docker Compose entry point.
# Run from open-core/ with:
#   pnpm run docker:dev
#   pnpm run docker:prod
#   pnpm run docker:down
# Paths are relative to this file: open-core/infra/docker/compose.yml.

name: scout-open-core

services:
  api:
    profiles: ["dev"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.go-api
      target: dev
    environment:
      PORT: "4749"
      SCOUT_DB_PATH: /data/scout.db
      SCOUT_FRONTEND_DIST: /workspace/apps/web/dist
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      BLUESKY_HANDLE: ${BLUESKY_HANDLE:-}
      BLUESKY_APP_PASSWORD: ${BLUESKY_APP_PASSWORD:-}
      SCOUT_AI_BRIDGE_URL: ${SCOUT_AI_BRIDGE_URL:-}
      SCOUT_AI_BRIDGE_TOKEN_FILE: ${SCOUT_AI_BRIDGE_TOKEN_FILE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4749:4749"
    volumes:
      - ../../apps/api:/src/apps/api
      - ../../db:/src/db
      - ../../apps/web:/workspace/apps/web
      - ../../packages/shared:/workspace/packages/shared
      - scout_open_core_sqlite_data:/data
      - type: bind
        source: ${SCOUT_AI_BRIDGE_HOST_TOKEN_FILE:-../../.env.example}
        target: /run/secrets/scout-ai-bridge-token
        read_only: true

  web:
    profiles: ["dev"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      target: dev
    environment:
      VITE_API_PROXY_TARGET: http://api:4749
    ports:
      - "4748:4748"
    depends_on:
      - api
    volumes:
      - ../..:/workspace
      - scout_open_core_node_modules:/workspace/node_modules
      - scout_open_core_web_node_modules:/workspace/apps/web/node_modules
    command: >
      sh -c "pnpm install --frozen-lockfile && pnpm --dir apps/web exec vite --host 0.0.0.0 --port 4748"

  api-prod:
    profiles: ["prod"]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.go-api
      target: prod
    environment:
      PORT: "4749"
      SCOUT_DB_PATH: /data/scout.db
      SCOUT_FRONTEND_DIST: /app/web/dist
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
      BLUESKY_HANDLE: ${BLUESKY_HANDLE:-}
      BLUESKY_APP_PASSWORD: ${BLUESKY_APP_PASSWORD:-}
    ports:
      - "4749:4749"
    volumes:
      - scout_open_core_sqlite_data:/data

volumes:
  scout_open_core_node_modules:
    name: scout_open_core_node_modules
  scout_open_core_web_node_modules:
    name: scout_open_core_web_node_modules
  scout_open_core_sqlite_data:
    name: scout_open_core_sqlite_data
